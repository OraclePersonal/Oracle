<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffc8"/>
      <stop offset="50%" stop-color="#00b8ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffc8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g stroke="#00ffc8" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Outer ring -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="8 6" opacity="0.4"/>

  <!-- Inner ring -->
  <circle cx="256" cy="220" r="110" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.3"/>

  <!-- Central diamond / gem shape -->
  <g filter="url(#softGlow)">
    <polygon points="256,100 340,220 256,340 172,220" fill="none" stroke="url(#glowGrad)" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Inner diamond -->
  <g filter="url(#neonGlow)">
    <polygon points="256,140 310,220 256,300 202,220" fill="none" stroke="#00ffc8" stroke-width="2" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Center dot / eye -->
  <circle cx="256" cy="220" r="12" fill="#00ffc8" filter="url(#neonGlow)"/>
  <circle cx="256" cy="220" r="5" fill="#ffffff" opacity="0.9"/>

  <!-- Connector lines from diamond to ring -->
  <g stroke="#00ffc8" stroke-width="0.8" opacity="0.3">
    <line x1="256" y1="100" x2="256" y2="80"/>
    <line x1="340" y1="220" x2="360" y2="220"/>
    <line x1="256" y1="340" x2="256" y2="360"/>
    <line x1="172" y1="220" x2="152" y2="220"/>
  </g>

  <!-- Side connector lines -->
  <g stroke="#7c3aed" stroke-width="1" opacity="0.4" stroke-dasharray="3 3">
    <line x1="116" y1="220" x2="172" y2="220"/>
    <line x1="340" y1="220" x2="396" y2="220"/>
  </g>

  <!-- Text: ORACLE -->
  <g filter="url(#neonGlow)">
    <text x="256" y="420" font-family="'Courier New', 'Consolas', monospace" font-size="48" font-weight="bold" fill="url(#glowGrad)" text-anchor="middle" letter-spacing="12">ORACLE</text>
  </g>

  <!-- Tagline -->
  <text x="256" y="450" font-family="'Courier New', 'Consolas', monospace" font-size="12" fill="#00ffc8" opacity="0.6" text-anchor="middle" letter-spacing="4">AI COORDINATION LAYER</text>
</svg>
